syntax = "proto3";

package auction.service.v1;

option go_package = "live-auction-bid/backend/api/auction/service/v1;v1";

service AuctionService {
  rpc CreateAuctionSession(CreateAuctionSessionRequest) returns (AuctionSession);
  rpc GetLiveRoomState(GetLiveRoomStateRequest) returns (LiveRoomState);
  rpc ListLots(ListLotsRequest) returns (ListLotsReply);
  rpc CreateLot(CreateLotRequest) returns (Lot);
  rpc StartLot(StartLotRequest) returns (Lot);
  rpc PlaceBid(PlaceBidRequest) returns (PlaceBidReply);
  rpc ListRanking(ListRankingRequest) returns (ListRankingReply);
  rpc SettleLot(SettleLotRequest) returns (Settlement);
  rpc SuggestAuctionRule(SuggestAuctionRuleRequest) returns (AIPriceSuggestion);
  rpc GenerateAtmosphereLine(GenerateAtmosphereLineRequest) returns (GenerateAtmosphereLineReply);
}

message CreateAuctionSessionRequest {
  string room_id = 1;
  string title = 2;
}

message AuctionSession {
  string id = 1;
  string room_id = 2;
  string title = 3;
  string status = 4;
  string started_at = 5;
  string ended_at = 6;
}

message BidRule {
  int64 start_price = 1;
  int64 min_increment = 2;
  int64 reserve_price = 3;
  int32 anti_snipe_extend_seconds = 4;
  int32 max_bid_per_user_per_second = 5;
}

message ListLotsRequest {}
message ListLotsReply { repeated Lot lots = 1; }

message CreateLotRequest {
  string room_id = 1;
  string session_id = 2;
  string title = 3;
  string description = 4;
  string image_url = 5;
  BidRule rule = 6;
  int32 duration_sec = 7;
}

message StartLotRequest { string lot_id = 1; }

message PlaceBidRequest {
  string lot_id = 1;
  string user_id = 2;
  string nickname = 3;
  int64 amount = 4;
  int64 client_known_version = 5;
  string idempotency_key = 6;
}

message PlaceBidReply {
  bool accepted = 1;
  string reason = 2;
  Lot lot = 3;
  Bid bid = 4;
  repeated RankingItem ranking = 5;
}

message SettleLotRequest { string lot_id = 1; }

message Lot {
  string id = 1;
  string room_id = 2;
  string session_id = 3;
  string title = 4;
  string description = 5;
  string image_url = 6;
  int64 start_price = 7;
  int64 current_price = 8;
  int64 min_increment = 9;
  string status = 10;
  string ends_at = 11;
  string winner_user_id = 12;
  int64 version = 13;
  string atmosphere_text = 14;
}

message Bid {
  string id = 1;
  string lot_id = 2;
  string user_id = 3;
  string nickname = 4;
  int64 amount = 5;
  string created_at = 6;
}

message RankingItem {
  int32 rank = 1;
  string user_id = 2;
  string nickname = 3;
  int64 amount = 4;
  string at = 5;
}

message ListRankingRequest {
  string lot_id = 1;
  int32 limit = 2;
}
message ListRankingReply { repeated RankingItem items = 1; }

message LiveRoomState {
  string room_id = 1;
  AuctionSession session = 2;
  Lot current_lot = 3;
  repeated RankingItem ranking = 4;
  int32 online_users = 5;
  int64 server_time_ms = 6;
}

message GetLiveRoomStateRequest { string room_id = 1; }

message Settlement {
  string lot_id = 1;
  string winner_user_id = 2;
  int64 final_price = 3;
  string settled_at = 4;
}

message AuctionEvent {
  string id = 1;
  string type = 2;
  string room_id = 3;
  string lot_id = 4;
  int64 version = 5;
  string created_at = 6;
}

message SuggestAuctionRuleRequest {
  string title = 1;
  string description = 2;
  int64 reference_price = 3;
}

message AIPriceSuggestion {
  int64 start_price = 1;
  int64 reserve_price = 2;
  int64 min_increment = 3;
  double confidence = 4;
  string reason = 5;
  repeated string signals = 6;
}

message GenerateAtmosphereLineRequest {
  Lot lot = 1;
  Bid latest_bid = 2;
  repeated RankingItem ranking = 3;
  int32 online_users = 4;
  int32 seconds_left = 5;
}

message GenerateAtmosphereLineReply { string line = 1; }
