syntax = "proto3";

package auction.v1;

option go_package = "live-auction-bid/backend/api/auction/v1;v1";

service AuctionService {
  rpc ListLots(ListLotsRequest) returns (ListLotsReply);
  rpc CreateLot(CreateLotRequest) returns (Lot);
  rpc PlaceBid(PlaceBidRequest) returns (Lot);
  rpc SettleLot(SettleLotRequest) returns (Lot);
}

message ListLotsRequest {}
message ListLotsReply { repeated Lot lots = 1; }

message CreateLotRequest {
  string room_id = 1;
  string title = 2;
  string description = 3;
  string image_url = 4;
  int64 start_price = 5;
  int64 min_increment = 6;
  int32 duration_sec = 7;
}

message PlaceBidRequest {
  string lot_id = 1;
  string user_id = 2;
  string nickname = 3;
  int64 amount = 4;
}

message SettleLotRequest { string lot_id = 1; }

message Lot {
  string id = 1;
  string room_id = 2;
  string title = 3;
  string description = 4;
  string image_url = 5;
  int64 start_price = 6;
  int64 current_price = 7;
  int64 min_increment = 8;
  string status = 9;
  string ends_at = 10;
  string winner_user_id = 11;
  int64 version = 12;
}
