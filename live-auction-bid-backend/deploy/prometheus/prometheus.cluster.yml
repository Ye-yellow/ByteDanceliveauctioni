global:
  scrape_interval: 2s
  scrape_timeout: 1s
  evaluation_interval: 2s
  external_labels:
    service: live-auction
    environment: cluster-validation

rule_files:
  - /etc/prometheus/rules/live-auction-cluster.yml

scrape_configs:
  - job_name: live-auction-backend
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/live-auction-backends.yml
        refresh_interval: 15s

  - job_name: live-auction-shard-gateway
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/live-auction-gateways.yml
        refresh_interval: 15s
