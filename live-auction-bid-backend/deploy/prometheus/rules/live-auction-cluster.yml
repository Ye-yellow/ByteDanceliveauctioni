groups:
  - name: live-auction-cluster
    rules:
      - alert: AuctionBackendDown
        expr: up{job="live-auction-backend"} == 0
        for: 30s
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "LiveAuction backend target is down"
          description: "Prometheus cannot scrape a backend instance for 30 seconds."

      - alert: AuctionShardGatewayDown
        expr: up{job="live-auction-shard-gateway"} == 0
        for: 30s
        labels:
          severity: critical
          component: shard-gateway
        annotations:
          summary: "LiveAuction shard gateway is down"
          description: "The unified shard gateway cannot be scraped. HTTP and WebSocket unified entry may be unavailable."

      - alert: AuctionShardGatewayRouteError
        expr: increase(auction_gateway_routed_requests_total{result="error"}[5m]) > 0
        for: 0s
        labels:
          severity: critical
          component: shard-gateway
        annotations:
          summary: "Shard gateway route errors detected"
          description: "The gateway failed to resolve or proxy at least one routed request in the last 5 minutes."

      - alert: AuctionCrossShardAggregationError
        expr: increase(auction_gateway_aggregate_shard_requests_total{result="error"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: shard-gateway
        annotations:
          summary: "Cross-shard aggregation has partial failures"
          description: "At least one shard failed during an aggregate dashboard/list query."

      - alert: AuctionProjectionPendingHigh
        expr: auction_projection_pending_count > 1000
        for: 1m
        labels:
          severity: warning
          component: projection
        annotations:
          summary: "Runtime Projection pending queue is high"
          description: "Projection pending count is above 1000 for more than 1 minute."

      - alert: AuctionProjectionLagHigh
        expr: auction_projection_lag_ms > 5000
        for: 1m
        labels:
          severity: warning
          component: projection
        annotations:
          summary: "Runtime Projection lag is high"
          description: "Projection lag is above 5 seconds for more than 1 minute."

      - alert: AuctionProjectionFailed
        expr: increase(auction_projection_failed_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
          component: projection
        annotations:
          summary: "Runtime Projection has failed events"
          description: "At least one runtime event failed projection in the last 5 minutes."

      - alert: AuctionBidInternalError
        expr: increase(auction_bid_requests_total{result="error"}[5m]) > 0
        for: 0s
        labels:
          severity: critical
          component: bidding
        annotations:
          summary: "Bid path returned internal errors"
          description: "Internal errors appeared on the bid hot path in the last 5 minutes."

      - alert: AuctionRealtimeFanoutStalled
        expr: increase(auction_ws_events_sent_total[2m]) == 0 and increase(auction_bid_accepted_total[2m]) > 0
        for: 1m
        labels:
          severity: warning
          component: websocket
        annotations:
          summary: "Realtime fanout may be stalled"
          description: "Accepted bids are increasing, but realtime fanout has not moved."
