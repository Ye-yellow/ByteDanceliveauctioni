services:
  auction-shard-gateway:
    image: live-auction-bid-backend:prod
    container_name: live-auction-shard-gateway
    entrypoint: ["/app/auction-shard-gateway"]
    env_file:
      - "${LIVE_AUCTION_ENV_FILE:-/opt/live-auction/.env}"
    environment:
      AUCTION_GATEWAY_ADDR: ":18081"
      AUCTION_CLUSTER_REGISTRY_JSON: "${AUCTION_CLUSTER_REGISTRY_JSON:?AUCTION_CLUSTER_REGISTRY_JSON is required}"
      AUCTION_GATEWAY_ROUTE_REDIS_ADDR: "${AUCTION_GATEWAY_ROUTE_REDIS_ADDR:-redis:6379}"
      AUCTION_GATEWAY_ROUTE_REDIS_PASSWORD: "${AUCTION_GATEWAY_ROUTE_REDIS_PASSWORD:-${AUCTION_REDIS_PASSWORD}}"
      AUCTION_GATEWAY_ROUTE_PREFIX: "${AUCTION_GATEWAY_ROUTE_PREFIX:-auction:route}"
      AUCTION_GATEWAY_ADMIN_TOKEN: "${AUCTION_GATEWAY_ADMIN_TOKEN:-}"
    ports:
      - "${AUCTION_GATEWAY_PUBLISH:-18081}:18081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

networks:
  live-auction:
    driver: bridge
