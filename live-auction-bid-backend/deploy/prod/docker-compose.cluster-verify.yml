x-backend-env: &backend-env
  AUCTION_HTTP_ADDR: ":18080"
  AUCTION_ENV: "verify"
  AUCTION_CLUSTER_MODE: "sharded"
  AUCTION_CLUSTER_REGISTRY_JSON: '{"shards":[{"id":0,"name":"verify-shard-0","backendUrl":"http://backend0:18080","status":"active","weight":1},{"id":1,"name":"verify-shard-1","backendUrl":"http://backend1:18080","status":"active","weight":1},{"id":2,"name":"verify-hot-shard","backendUrl":"http://backend2:18080","status":"active","weight":1,"hotDedicated":true}],"assignments":[{"roomId":"room-hot-verify","shardId":2}]}'
  AUCTION_REALTIME_BUS: "nats"
  AUCTION_REALTIME_BUS_NATS_URL: "nats://nats:4222"
  AUCTION_REALTIME_BUS_NATS_SUBJECT: "auction.realtime.events.verify"
  AUCTION_REALTIME_BUS_NATS_QUEUE: ""
  AUCTION_WS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1"
  AUCTION_WS_ALLOW_MISSING_ORIGIN: "true"
  AUCTION_STORAGE_PROVIDER: "local"
  AUCTION_LOCAL_STORAGE_DIR: "/tmp/live-auction-assets"
  AUCTION_LOCAL_STORAGE_PUBLIC_BASE_URL: "http://localhost:28083/assets"
  AUCTION_CONSUL_ADDR: "consul:8500"
  AUCTION_SERVICE_NAME: "auction-backend"
  AUCTION_JWT_SECRET: "cluster-verify-jwt-secret"
  AUCTION_JWT_ISSUER: "auction-backend"
  AUCTION_BOOTSTRAP_MAIN_ACCOUNT_USERNAME: "main"
  AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD: "main-pass"
  AUCTION_BOOTSTRAP_MAIN_ACCOUNT_NICKNAME: "verify-main"
  AUCTION_BID_SYNC_PROJECTION: "false"
  AUCTION_BID_DB_GUARD_MODE: "runtime-first"
  AUCTION_RUNTIME_PROJECTION_SHARDS: "8"
  AUCTION_RUNTIME_PROJECTION_BATCH_LIMIT: "100"
  AUCTION_RUNTIME_PROJECTION_DRAIN_BATCHES: "10"
  AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_PENDING_LIMIT: "1000"
  AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_LAG: "5s"
  AUCTION_DB_MAX_OPEN_CONNS: "12"
  AUCTION_DB_MAX_IDLE_CONNS: "6"
  AUCTION_REDIS_POOL_SIZE: "48"
  AUCTION_REDIS_MIN_IDLE_CONNS: "8"

x-backend-health: &backend-health
  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/readyz"]
  interval: 10s
  timeout: 5s
  retries: 18

services:
  nats:
    image: nats:2.10-alpine
    container_name: live-auction-verify-nats
    command: ["-m", "8222"]
    ports:
      - "127.0.0.1:28222:8222"
    networks:
      - live-auction-verify

  consul:
    image: hashicorp/consul:1.18
    container_name: live-auction-verify-consul
    command: ["agent", "-dev", "-client=0.0.0.0"]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - live-auction-verify

  mysql0:
    image: mysql:8.4
    container_name: live-auction-verify-mysql-0
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: verify-mysql-pass
      MYSQL_ROOT_PASSWORD: verify-root-pass
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=128
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uauction -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - live-auction-verify

  redis0:
    image: redis:7.2-alpine
    container_name: live-auction-verify-redis-0
    environment:
      REDIS_PASSWORD: verify-redis-pass
    command: ["sh", "-c", "redis-server --appendonly no --requirepass \"$${REDIS_PASSWORD}\" --maxmemory-policy noeviction"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - live-auction-verify

  backend0:
    image: live-auction-bid-backend:cluster-verify
    container_name: live-auction-verify-backend-0
    environment:
      <<: *backend-env
      AUCTION_INSTANCE_ID: "verify-shard-0"
      AUCTION_SERVICE_ADDR: "backend0"
      AUCTION_MYSQL_DSN: "auction:verify-mysql-pass@tcp(mysql0:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis0:6379"
      AUCTION_REDIS_PASSWORD: "verify-redis-pass"
      AUCTION_REALTIME_BUS_NATS_NAME: "live-auction-verify-shard-0"
    ports:
      - "127.0.0.1:28080:18080"
    depends_on:
      mysql0:
        condition: service_healthy
      redis0:
        condition: service_healthy
      consul:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck: *backend-health
    networks:
      - live-auction-verify

  mysql1:
    image: mysql:8.4
    container_name: live-auction-verify-mysql-1
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: verify-mysql-pass
      MYSQL_ROOT_PASSWORD: verify-root-pass
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=128
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uauction -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - live-auction-verify

  redis1:
    image: redis:7.2-alpine
    container_name: live-auction-verify-redis-1
    environment:
      REDIS_PASSWORD: verify-redis-pass
    command: ["sh", "-c", "redis-server --appendonly no --requirepass \"$${REDIS_PASSWORD}\" --maxmemory-policy noeviction"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - live-auction-verify

  backend1:
    image: live-auction-bid-backend:cluster-verify
    container_name: live-auction-verify-backend-1
    environment:
      <<: *backend-env
      AUCTION_INSTANCE_ID: "verify-shard-1"
      AUCTION_SERVICE_ADDR: "backend1"
      AUCTION_MYSQL_DSN: "auction:verify-mysql-pass@tcp(mysql1:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis1:6379"
      AUCTION_REDIS_PASSWORD: "verify-redis-pass"
      AUCTION_REALTIME_BUS_NATS_NAME: "live-auction-verify-shard-1"
    ports:
      - "127.0.0.1:28081:18080"
    depends_on:
      mysql1:
        condition: service_healthy
      redis1:
        condition: service_healthy
      consul:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck: *backend-health
    networks:
      - live-auction-verify

  mysql2:
    image: mysql:8.4
    container_name: live-auction-verify-mysql-2
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: verify-mysql-pass
      MYSQL_ROOT_PASSWORD: verify-root-pass
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=128
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uauction -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - live-auction-verify

  redis2:
    image: redis:7.2-alpine
    container_name: live-auction-verify-redis-2
    environment:
      REDIS_PASSWORD: verify-redis-pass
    command: ["sh", "-c", "redis-server --appendonly no --requirepass \"$${REDIS_PASSWORD}\" --maxmemory-policy noeviction"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - live-auction-verify

  backend2:
    image: live-auction-bid-backend:cluster-verify
    container_name: live-auction-verify-backend-2
    environment:
      <<: *backend-env
      AUCTION_INSTANCE_ID: "verify-hot-shard"
      AUCTION_SERVICE_ADDR: "backend2"
      AUCTION_MYSQL_DSN: "auction:verify-mysql-pass@tcp(mysql2:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis2:6379"
      AUCTION_REDIS_PASSWORD: "verify-redis-pass"
      AUCTION_REALTIME_BUS_NATS_NAME: "live-auction-verify-shard-2"
    ports:
      - "127.0.0.1:28082:18080"
    depends_on:
      mysql2:
        condition: service_healthy
      redis2:
        condition: service_healthy
      consul:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck: *backend-health
    networks:
      - live-auction-verify

  gateway:
    image: live-auction-bid-backend:cluster-verify
    container_name: live-auction-verify-gateway
    entrypoint: ["/app/auction-shard-gateway"]
    environment:
      AUCTION_GATEWAY_ADDR: ":18081"
      AUCTION_CLUSTER_REGISTRY_JSON: '{"shards":[{"id":0,"name":"verify-shard-0","backendUrl":"http://backend0:18080","status":"active","weight":1},{"id":1,"name":"verify-shard-1","backendUrl":"http://backend1:18080","status":"active","weight":1},{"id":2,"name":"verify-hot-shard","backendUrl":"http://backend2:18080","status":"active","weight":1,"hotDedicated":true}],"assignments":[{"roomId":"room-hot-verify","shardId":2}]}'
      AUCTION_GATEWAY_ROUTE_REDIS_ADDR: "redis0:6379"
      AUCTION_GATEWAY_ROUTE_REDIS_PASSWORD: "verify-redis-pass"
      AUCTION_GATEWAY_ROUTE_PREFIX: "auction:verify:route"
      AUCTION_GATEWAY_ADMIN_TOKEN: "verify-admin-token"
    ports:
      - "127.0.0.1:28083:18081"
    depends_on:
      backend0:
        condition: service_healthy
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
      redis0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - live-auction-verify

networks:
  live-auction-verify:
    name: live-auction-verify
    driver: bridge
