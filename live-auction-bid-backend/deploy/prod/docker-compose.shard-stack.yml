services:
  auction-backend:
    image: live-auction-bid-backend:prod
    container_name: "live-auction-bid-backend-${AUCTION_INSTANCE_ID:-shard}"
    env_file:
      - "${LIVE_AUCTION_ENV_FILE:-/opt/live-auction/.env}"
    environment:
      AUCTION_HTTP_ADDR: ":18080"
      AUCTION_ENV: "${AUCTION_ENV:-prod}"
      AUCTION_INSTANCE_ID: "${AUCTION_INSTANCE_ID:?AUCTION_INSTANCE_ID is required}"
      AUCTION_CLUSTER_MODE: "${AUCTION_CLUSTER_MODE:-sharded}"
      AUCTION_CLUSTER_REGISTRY_JSON: "${AUCTION_CLUSTER_REGISTRY_JSON:?AUCTION_CLUSTER_REGISTRY_JSON is required}"
      AUCTION_REALTIME_BUS: "${AUCTION_REALTIME_BUS:-redis}"
      AUCTION_REALTIME_BUS_REDIS_ADDR: "${AUCTION_REALTIME_BUS_REDIS_ADDR:-redis:6379}"
      AUCTION_REALTIME_BUS_REDIS_PASSWORD: "${AUCTION_REALTIME_BUS_REDIS_PASSWORD:-${AUCTION_REDIS_PASSWORD}}"
      AUCTION_REALTIME_BUS_CHANNEL: "${AUCTION_REALTIME_BUS_CHANNEL:-auction:realtime:events}"
      AUCTION_REALTIME_BUS_STREAM: "${AUCTION_REALTIME_BUS_STREAM:-auction:realtime:events:stream}"
      AUCTION_REALTIME_BUS_GROUP: "${AUCTION_REALTIME_BUS_GROUP:-auction-realtime-${AUCTION_INSTANCE_ID}}"
      AUCTION_REALTIME_BUS_CONSUMER: "${AUCTION_REALTIME_BUS_CONSUMER:-${AUCTION_INSTANCE_ID}}"
      AUCTION_REALTIME_BUS_STREAM_COUNT: "${AUCTION_REALTIME_BUS_STREAM_COUNT:-100}"
      AUCTION_REALTIME_BUS_STREAM_MAXLEN: "${AUCTION_REALTIME_BUS_STREAM_MAXLEN:-100000}"
      AUCTION_REALTIME_BUS_NATS_URL: "${AUCTION_REALTIME_BUS_NATS_URL:-nats://127.0.0.1:4222}"
      AUCTION_REALTIME_BUS_NATS_SUBJECT: "${AUCTION_REALTIME_BUS_NATS_SUBJECT:-auction.realtime.events}"
      AUCTION_REALTIME_BUS_NATS_QUEUE: "${AUCTION_REALTIME_BUS_NATS_QUEUE:-}"
      AUCTION_REALTIME_BUS_NATS_NAME: "${AUCTION_REALTIME_BUS_NATS_NAME:-live-auction-${AUCTION_INSTANCE_ID}}"
      AUCTION_WS_ALLOWED_ORIGINS: "${AUCTION_WS_ALLOWED_ORIGINS:?AUCTION_WS_ALLOWED_ORIGINS is required}"
      AUCTION_WS_ALLOW_MISSING_ORIGIN: "${AUCTION_WS_ALLOW_MISSING_ORIGIN:-false}"
      AUCTION_MYSQL_DSN: "auction:${AUCTION_MYSQL_PASSWORD:?AUCTION_MYSQL_PASSWORD is required}@tcp(mysql:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis:6379"
      AUCTION_REDIS_PASSWORD: "${AUCTION_REDIS_PASSWORD:?AUCTION_REDIS_PASSWORD is required}"
      AUCTION_PAYMENT_PROVIDER: "${AUCTION_PAYMENT_PROVIDER:?AUCTION_PAYMENT_PROVIDER is required}"
      AUCTION_CONSUL_ADDR: "${AUCTION_CONSUL_ADDR:-consul:8500}"
      AUCTION_SERVICE_NAME: "auction-backend"
      AUCTION_SERVICE_ADDR: "${AUCTION_SERVICE_ADDR:?AUCTION_SERVICE_ADDR is required}"
      AUCTION_JWT_SECRET: "${AUCTION_JWT_SECRET:?AUCTION_JWT_SECRET is required}"
      AUCTION_JWT_ISSUER: "auction-backend"
      AUCTION_BOOTSTRAP_MAIN_ACCOUNT_USERNAME: "${AUCTION_BOOTSTRAP_MAIN_ACCOUNT_USERNAME:-main}"
      AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD: "${AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD:?AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD is required}"
      AUCTION_BOOTSTRAP_MAIN_ACCOUNT_NICKNAME: "${AUCTION_BOOTSTRAP_MAIN_ACCOUNT_NICKNAME:-主账号}"
      AUCTION_BID_SYNC_PROJECTION: "${AUCTION_BID_SYNC_PROJECTION:-false}"
      AUCTION_BID_DB_GUARD_MODE: "${AUCTION_BID_DB_GUARD_MODE:-runtime-first}"
      AUCTION_RUNTIME_PROJECTION_SHARDS: "${AUCTION_RUNTIME_PROJECTION_SHARDS:-32}"
      AUCTION_RUNTIME_PROJECTION_BATCH_LIMIT: "${AUCTION_RUNTIME_PROJECTION_BATCH_LIMIT:-500}"
      AUCTION_RUNTIME_PROJECTION_DRAIN_BATCHES: "${AUCTION_RUNTIME_PROJECTION_DRAIN_BATCHES:-40}"
      AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_PENDING_LIMIT: "${AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_PENDING_LIMIT:-5000}"
      AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_LAG: "${AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_LAG:-8s}"
      AUCTION_RUNTIME_PROJECT_LEGACY_STREAMS: "${AUCTION_RUNTIME_PROJECT_LEGACY_STREAMS:-false}"
      AUCTION_DB_MAX_OPEN_CONNS: "${AUCTION_DB_MAX_OPEN_CONNS:-40}"
      AUCTION_DB_MAX_IDLE_CONNS: "${AUCTION_DB_MAX_IDLE_CONNS:-20}"
      AUCTION_DB_CONN_MAX_LIFETIME: "${AUCTION_DB_CONN_MAX_LIFETIME:-30m}"
      AUCTION_DB_CONN_MAX_IDLE_TIME: "${AUCTION_DB_CONN_MAX_IDLE_TIME:-2m}"
      AUCTION_REDIS_POOL_SIZE: "${AUCTION_REDIS_POOL_SIZE:-192}"
      AUCTION_REDIS_MIN_IDLE_CONNS: "${AUCTION_REDIS_MIN_IDLE_CONNS:-32}"
    ports:
      - "${AUCTION_HTTP_PUBLISH:-18080}:18080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  mysql:
    image: mysql:8.4
    container_name: "live-auction-mysql-${AUCTION_INSTANCE_ID:-shard}"
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: "${AUCTION_MYSQL_PASSWORD:?AUCTION_MYSQL_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${AUCTION_MYSQL_ROOT_PASSWORD:?AUCTION_MYSQL_ROOT_PASSWORD is required}"
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-1G}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-256}
    volumes:
      - live-auction-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uauction -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  redis:
    image: redis:7.2-alpine
    container_name: "live-auction-redis-${AUCTION_INSTANCE_ID:-shard}"
    environment:
      REDIS_PASSWORD: "${AUCTION_REDIS_PASSWORD:?AUCTION_REDIS_PASSWORD is required}"
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}" --maxmemory-policy noeviction
    volumes:
      - live-auction-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  consul:
    image: hashicorp/consul:1.18
    container_name: "live-auction-consul-${AUCTION_INSTANCE_ID:-shard}"
    command: ["agent", "-dev", "-client=0.0.0.0"]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

volumes:
  live-auction-mysql:
  live-auction-redis:

networks:
  live-auction:
    driver: bridge
