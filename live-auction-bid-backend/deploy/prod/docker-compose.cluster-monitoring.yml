services:
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: live-auction-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./backend/deploy/prometheus/prometheus.cluster.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/deploy/prometheus/rules:/etc/prometheus/rules:ro
      - ./backend/deploy/prometheus/file_sd:/etc/prometheus/file_sd:ro
      - live-auction-prometheus:/prometheus
    networks:
      - live-auction

volumes:
  live-auction-prometheus:

networks:
  live-auction:
    driver: bridge
