services:
  auction-backend:
    build:
      context: ./backend
      dockerfile: deploy/Dockerfile
    image: live-auction-bid-backend:prod
    container_name: live-auction-bid-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      AUCTION_HTTP_ADDR: ":18080"
      AUCTION_ENV: "${AUCTION_ENV:-prod}"
      AUCTION_WS_ALLOWED_ORIGINS: "${AUCTION_WS_ALLOWED_ORIGINS:?AUCTION_WS_ALLOWED_ORIGINS is required}"
      AUCTION_WS_ALLOW_MISSING_ORIGIN: "${AUCTION_WS_ALLOW_MISSING_ORIGIN:-false}"
      AUCTION_WS_TICKET_TTL: "${AUCTION_WS_TICKET_TTL:-60s}"
      AUCTION_MYSQL_DSN: "auction:${AUCTION_MYSQL_PASSWORD:?AUCTION_MYSQL_PASSWORD is required}@tcp(mysql:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis:6379"
      AUCTION_REDIS_PASSWORD: "${AUCTION_REDIS_PASSWORD:?AUCTION_REDIS_PASSWORD is required}"
      AUCTION_SEARCH_PROVIDER: "${AUCTION_SEARCH_PROVIDER:-}"
      AUCTION_SEARCH_PG_DSN: "${AUCTION_SEARCH_PG_DSN:-}"
      AUCTION_SEARCH_SYNC_INTERVAL: "${AUCTION_SEARCH_SYNC_INTERVAL:-5m}"
      AUCTION_SEARCH_SYNC_BATCH_LIMIT: "${AUCTION_SEARCH_SYNC_BATCH_LIMIT:-500}"
      AUCTION_SEARCH_HIDDEN_RETENTION: "${AUCTION_SEARCH_HIDDEN_RETENTION:-168h}"
      AUCTION_EMBEDDING_PROVIDER: "${AUCTION_EMBEDDING_PROVIDER:-dashscope}"
      AUCTION_EMBEDDING_BASE_URL: "${AUCTION_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
      AUCTION_EMBEDDING_MODEL: "${AUCTION_EMBEDDING_MODEL:-text-embedding-v4}"
      AUCTION_EMBEDDING_DIMENSIONS: "${AUCTION_EMBEDDING_DIMENSIONS:-1024}"
      AUCTION_EMBEDDING_BATCH_SIZE: "${AUCTION_EMBEDDING_BATCH_SIZE:-10}"
      AUCTION_EMBEDDING_TIMEOUT: "${AUCTION_EMBEDDING_TIMEOUT:-8s}"
      AUCTION_EMBEDDING_API_KEY: "${AUCTION_EMBEDDING_API_KEY:-}"
      AUCTION_AI_PROVIDER: "${AUCTION_AI_PROVIDER:-mock}"
      AUCTION_AI_BASE_URL: "${AUCTION_AI_BASE_URL:-}"
      AUCTION_AI_MODEL: "${AUCTION_AI_MODEL:-}"
      AUCTION_AI_TIMEOUT: "${AUCTION_AI_TIMEOUT:-8s}"
      AUCTION_AI_MOCK_ON_FAILURE: "${AUCTION_AI_MOCK_ON_FAILURE:-true}"
      AUCTION_AI_API_KEY: "${AUCTION_AI_API_KEY:-}"
      AUCTION_PAYMENT_PROVIDER: "${AUCTION_PAYMENT_PROVIDER:?AUCTION_PAYMENT_PROVIDER is required}"
      AUCTION_CONSUL_ADDR: "consul:8500"
      AUCTION_SERVICE_NAME: "auction-backend"
      AUCTION_SERVICE_ADDR: "auction-backend"
      AUCTION_JWT_SECRET: "${AUCTION_JWT_SECRET:?AUCTION_JWT_SECRET is required}"
      AUCTION_JWT_ISSUER: "auction-backend"
      AUCTION_BOOTSTRAP_MAIN_ACCOUNT_USERNAME: "${AUCTION_BOOTSTRAP_MAIN_ACCOUNT_USERNAME:-main}"
      AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD: "${AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD:?AUCTION_BOOTSTRAP_MAIN_ACCOUNT_PASSWORD is required}"
      AUCTION_BOOTSTRAP_MAIN_ACCOUNT_NICKNAME: "${AUCTION_BOOTSTRAP_MAIN_ACCOUNT_NICKNAME:-主账号}"
      AUCTION_BID_SYNC_PROJECTION: "${AUCTION_BID_SYNC_PROJECTION:-false}"
      AUCTION_BID_DB_GUARD_MODE: "${AUCTION_BID_DB_GUARD_MODE:-runtime-first}"
      AUCTION_VERBOSE_BID_LOG: "${AUCTION_VERBOSE_BID_LOG:-false}"
      AUCTION_RUNTIME_PROJECTION_SHARDS: "${AUCTION_RUNTIME_PROJECTION_SHARDS:-16}"
      AUCTION_RUNTIME_PROJECTION_BATCH_LIMIT: "${AUCTION_RUNTIME_PROJECTION_BATCH_LIMIT:-300}"
      AUCTION_RUNTIME_PROJECTION_DRAIN_BATCHES: "${AUCTION_RUNTIME_PROJECTION_DRAIN_BATCHES:-20}"
      AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_PENDING_LIMIT: "${AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_PENDING_LIMIT:-3000}"
      AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_LAG: "${AUCTION_RUNTIME_PROJECTION_BACKPRESSURE_LAG:-5s}"
      AUCTION_RUNTIME_PROJECT_LEGACY_STREAMS: "${AUCTION_RUNTIME_PROJECT_LEGACY_STREAMS:-false}"
      AUCTION_DB_MAX_OPEN_CONNS: "${AUCTION_DB_MAX_OPEN_CONNS:-30}"
      AUCTION_DB_MAX_IDLE_CONNS: "${AUCTION_DB_MAX_IDLE_CONNS:-15}"
      AUCTION_DB_CONN_MAX_LIFETIME: "${AUCTION_DB_CONN_MAX_LIFETIME:-30m}"
      AUCTION_DB_CONN_MAX_IDLE_TIME: "${AUCTION_DB_CONN_MAX_IDLE_TIME:-2m}"
      AUCTION_REDIS_POOL_SIZE: "${AUCTION_REDIS_POOL_SIZE:-128}"
      AUCTION_REDIS_MIN_IDLE_CONNS: "${AUCTION_REDIS_MIN_IDLE_CONNS:-16}"
    ports:
      - "127.0.0.1:18080:18080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  mysql:
    image: mysql:8.4
    container_name: live-auction-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: live_auction
      MYSQL_USER: auction
      MYSQL_PASSWORD: "${AUCTION_MYSQL_PASSWORD:?AUCTION_MYSQL_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${AUCTION_MYSQL_ROOT_PASSWORD:?AUCTION_MYSQL_ROOT_PASSWORD is required}"
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-768M}
    volumes:
      - live-auction-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uauction -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  redis:
    image: redis:7.2-alpine
    container_name: live-auction-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${AUCTION_REDIS_PASSWORD:?AUCTION_REDIS_PASSWORD is required}"
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - live-auction-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: live-auction-pgvector
    restart: unless-stopped
    profiles: ["search"]
    environment:
      POSTGRES_DB: live_auction_search
      POSTGRES_USER: auction_search
      POSTGRES_PASSWORD: "${AUCTION_SEARCH_PG_PASSWORD:-auction_search}"
      TZ: Asia/Shanghai
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=20
    volumes:
      - live-auction-pgvector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction_search -d live_auction_search"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  consul:
    image: hashicorp/consul:1.18
    container_name: live-auction-consul
    restart: unless-stopped
    command: ["agent", "-dev", "-client=0.0.0.0"]
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: live-auction-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./backend/deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - live-auction-prometheus:/prometheus
    depends_on:
      auction-backend:
        condition: service_healthy
    networks:
      - live-auction

  grafana:
    image: grafana/grafana:11.1.4
    container_name: live-auction-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_DEFAULT_THEME: "light"
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "13000:3000"
    volumes:
      - ./backend/deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - live-auction-grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - live-auction

volumes:
  live-auction-mysql:
  live-auction-redis:
  live-auction-pgvector:
  live-auction-prometheus:
  live-auction-grafana:

networks:
  live-auction:
    driver: bridge
