services:
  auction-backend:
    environment:
      AUCTION_INSTANCE_ID: "auction-backend-1"
      AUCTION_REALTIME_BUS: "${AUCTION_REALTIME_BUS:-redis}"
      AUCTION_REALTIME_BUS_CHANNEL: "${AUCTION_REALTIME_BUS_CHANNEL:-auction:realtime:events}"

  auction-backend-2:
    image: live-auction-bid-backend:prod
    container_name: live-auction-bid-backend-2
    env_file:
      - "${LIVE_AUCTION_ENV_FILE:-/opt/live-auction/.env}"
    environment:
      AUCTION_HTTP_ADDR: ":18080"
      AUCTION_INSTANCE_ID: "auction-backend-2"
      AUCTION_REALTIME_BUS: "${AUCTION_REALTIME_BUS:-redis}"
      AUCTION_REALTIME_BUS_CHANNEL: "${AUCTION_REALTIME_BUS_CHANNEL:-auction:realtime:events}"
      AUCTION_MYSQL_DSN: "auction:${AUCTION_MYSQL_PASSWORD:?AUCTION_MYSQL_PASSWORD is required}@tcp(mysql:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis:6379"
      AUCTION_REDIS_PASSWORD: "${AUCTION_REDIS_PASSWORD:?AUCTION_REDIS_PASSWORD is required}"
      AUCTION_CONSUL_ADDR: "consul:8500"
      AUCTION_SERVICE_NAME: "auction-backend"
      AUCTION_SERVICE_ADDR: "auction-backend-2"
      AUCTION_JWT_ISSUER: "auction-backend"
    ports:
      - "127.0.0.1:18081:18080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

  auction-backend-3:
    image: live-auction-bid-backend:prod
    container_name: live-auction-bid-backend-3
    env_file:
      - "${LIVE_AUCTION_ENV_FILE:-/opt/live-auction/.env}"
    environment:
      AUCTION_HTTP_ADDR: ":18080"
      AUCTION_INSTANCE_ID: "auction-backend-3"
      AUCTION_REALTIME_BUS: "${AUCTION_REALTIME_BUS:-redis}"
      AUCTION_REALTIME_BUS_CHANNEL: "${AUCTION_REALTIME_BUS_CHANNEL:-auction:realtime:events}"
      AUCTION_MYSQL_DSN: "auction:${AUCTION_MYSQL_PASSWORD:?AUCTION_MYSQL_PASSWORD is required}@tcp(mysql:3306)/live_auction?parseTime=true&charset=utf8mb4&loc=Local"
      AUCTION_REDIS_ADDR: "redis:6379"
      AUCTION_REDIS_PASSWORD: "${AUCTION_REDIS_PASSWORD:?AUCTION_REDIS_PASSWORD is required}"
      AUCTION_CONSUL_ADDR: "consul:8500"
      AUCTION_SERVICE_NAME: "auction-backend"
      AUCTION_SERVICE_ADDR: "auction-backend-3"
      AUCTION_JWT_ISSUER: "auction-backend"
    ports:
      - "127.0.0.1:18082:18080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction
