services:
  nats:
    image: nats:2.10-alpine
    container_name: live-auction-nats
    command: ["-m", "8222"]
    ports:
      - "${AUCTION_NATS_BIND_HOST:-127.0.0.1}:${AUCTION_NATS_CLIENT_PORT:-14222}:4222"
      - "${AUCTION_NATS_MONITOR_BIND_HOST:-127.0.0.1}:${AUCTION_NATS_MONITOR_HTTP_PORT:-18222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - live-auction

networks:
  live-auction:
    driver: bridge
