log_format auction_json escape=json
  '{"time":"$time_iso8601","method":"$request_method","uri":"$request_uri",'
  '"status":$status,"request_time":$request_time,'
  '"upstream_response_time":"$upstream_response_time",'
  '"upstream_connect_time":"$upstream_connect_time",'
  '"upstream_addr":"$upstream_addr","bytes_sent":$bytes_sent,'
  '"remote_addr":"$remote_addr","request_id":"$http_x_request_id"}';

upstream auction_backend {
  least_conn;
  server 127.0.0.1:18080 max_fails=3 fail_timeout=10s;
  server 127.0.0.1:18081 max_fails=3 fail_timeout=10s;
  server 127.0.0.1:18082 max_fails=3 fail_timeout=10s;
  keepalive 256;
}

server {
  listen 80 default_server;
  server_name _;

  root /opt/live-auction/www/h5;
  index index.html;
  client_max_body_size 50m;
  access_log /var/log/nginx/live-auction-h5.access.log auction_json buffer=256k flush=5s;

  location ~ ^/api/lots/[^/]+/bid$ {
    access_log /var/log/nginx/live-auction-bid.access.log auction_json buffer=256k flush=2s;
    proxy_pass http://auction_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }

  location /api/ {
    proxy_pass http://auction_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }

  location /healthz {
    proxy_pass http://auction_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
  }

  location /readyz {
    proxy_pass http://auction_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
  }

  location /ws {
    proxy_pass http://auction_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

